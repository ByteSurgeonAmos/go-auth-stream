<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Post Generation Streaming Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      button {
        background-color: #007bff;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background-color: #0056b3;
      }
      button:disabled {
        background-color: #6c757d;
        cursor: not-allowed;
      }
      #eventLog {
        background-color: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
        padding: 15px;
        margin-top: 20px;
        height: 400px;
        overflow-y: auto;
        font-family: monospace;
      }
      .event {
        margin-bottom: 10px;
        padding: 5px;
        border-radius: 3px;
      }
      .event.connected {
        background-color: #d4edda;
        border-left: 4px solid #28a745;
      }
      .event.started {
        background-color: #d1ecf1;
        border-left: 4px solid #17a2b8;
      }
      .event.progress {
        background-color: #fff3cd;
        border-left: 4px solid #ffc107;
      }
      .event.completed {
        background-color: #d4edda;
        border-left: 4px solid #28a745;
      }
      .event.error {
        background-color: #f8d7da;
        border-left: 4px solid #dc3545;
      }
      .status {
        margin-top: 10px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Agent Post Generation Streaming Demo</h1>

      <form id="postForm">
        <div class="form-group">
          <label for="userId">User ID:</label>
          <input
            type="text"
            id="userId"
            name="userId"
            value="user123"
            required
          />
        </div>

        <div class="form-group">
          <label for="platform">Platform:</label>
          <select id="platform" name="platform" required>
            <option value="twitter">Twitter</option>
            <option value="instagram">Instagram</option>
            <option value="facebook">Facebook</option>
            <option value="linkedin">LinkedIn</option>
          </select>
        </div>

        <div class="form-group">
          <label for="customPrompt">Custom Prompt (optional):</label>
          <textarea
            id="customPrompt"
            name="customPrompt"
            rows="3"
            placeholder="e.g., Write about AI trends in 2024"
          ></textarea>
        </div>

        <div class="form-group">
          <label for="companyUrl">Company URL (optional):</label>
          <input
            type="url"
            id="companyUrl"
            name="companyUrl"
            placeholder="https://example.com"
          />
        </div>

        <div class="form-group">
          <label>
            <input
              type="checkbox"
              id="includeCompanyData"
              name="includeCompanyData"
              checked
            />
            Include Company Data
          </label>
        </div>

        <button type="submit" id="generateBtn">
          Start Streaming Post Generation
        </button>
        <button type="button" id="stopBtn" disabled>Stop Stream</button>
      </form>

      <div class="status" id="status">Ready</div>

      <div id="eventLog">
        <div>Event log will appear here...</div>
      </div>
    </div>

    <script>
      let eventSource = null;
      const eventLog = document.getElementById("eventLog");
      const status = document.getElementById("status");
      const generateBtn = document.getElementById("generateBtn");
      const stopBtn = document.getElementById("stopBtn");

      function addEvent(type, data, timestamp = new Date()) {
        const eventDiv = document.createElement("div");
        eventDiv.className = `event ${type}`;
        eventDiv.innerHTML = `
                <strong>[${timestamp.toLocaleTimeString()}] ${type.toUpperCase()}:</strong><br>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
        eventLog.appendChild(eventDiv);
        eventLog.scrollTop = eventLog.scrollHeight;
      }

      function updateStatus(message) {
        status.textContent = message;
      }

      function startStreaming(requestData) {
        if (eventSource) {
          eventSource.close();
        }

        // Clear previous events
        eventLog.innerHTML = "";

        updateStatus("Connecting to stream...");
        generateBtn.disabled = true;
        stopBtn.disabled = false;

        // Build query string for GET request (EventSource only supports GET)
        const params = new URLSearchParams({
          user_id: requestData.user_id,
          platform: requestData.platform,
          include_company_data: requestData.include_company_data
            ? "true"
            : "false",
        });

        // Add optional parameters
        if (requestData.custom_prompt) {
          params.append("custom_prompt", requestData.custom_prompt);
        }
        if (requestData.company_url) {
          params.append("company_url", requestData.company_url);
        }
        if (requestData.conversation_id) {
          params.append("conversation_id", requestData.conversation_id);
        }
        if (requestData.company_id) {
          params.append("company_id", requestData.company_id);
        }

        // Use the correct server URL with port 8089
        const serverUrl = "http://localhost:8089";
        const streamUrl = `${serverUrl}/api/agent/generate/stream?${params.toString()}`;
        console.log("Connecting to:", streamUrl);

        eventSource = new EventSource(streamUrl);

        eventSource.onopen = function (event) {
          updateStatus("Connected to stream");
          addEvent("info", { message: "EventSource connection opened" });
        };

        eventSource.addEventListener("connected", function (event) {
          const data = JSON.parse(event.data);
          addEvent("connected", data);
          updateStatus("Post generation started");
        });

        eventSource.addEventListener("started", function (event) {
          const data = JSON.parse(event.data);
          addEvent("started", data);
          updateStatus("Generation in progress...");
        });

        eventSource.addEventListener("progress", function (event) {
          const data = JSON.parse(event.data);
          addEvent("progress", data);
          updateStatus("Generating content...");
        });

        eventSource.addEventListener("completed", function (event) {
          const data = JSON.parse(event.data);
          addEvent("completed", data);

          // Check if we have  actual post content
          if (data.post && data.post.content) {
            addEvent("result", {
              message: "✅ Generated Post Content",
              content: data.post.content,
              hashtags: data.post.hashtags,
              platform: data.post.platform,
              post_id: data.post.post_id,
            });
          } else if (
            data.response &&
            data.response.postResponse &&
            data.response.postResponse.content
          ) {
            addEvent("result", {
              message: "✅ Generated Post Content",
              content: data.response.postResponse.content,
              hashtags: data.response.postResponse.hashtags,
              platform: data.response.postResponse.platform,
              post_id: data.response.postResponse.postId,
            });
          } else {
            // Handle empty response case
            addEvent("warning", {
              message: "⚠️ Generation completed but no content received",
              details:
                "The agent microservice returned an empty response. This suggests an issue in the Nest.js service.",
              raw_response: data.response,
              troubleshooting: [
                "Check Nest.js agent service logs for errors",
                "Verify the GeneratePost method is returning proper data",
                "Check if conversation creation is working properly",
              ],
            });
          }

          updateStatus("Post generation completed");
          resetButtons();
          eventSource.close();
        });

        eventSource.addEventListener("error", function (event) {
          const data = JSON.parse(event.data);
          addEvent("error", data);
          updateStatus("Error occurred during generation");
          resetButtons();
          eventSource.close();
        });

        eventSource.onerror = function (event) {
          console.error("EventSource error:", event);
          addEvent("error", {
            message: "EventSource connection error",
            readyState: eventSource.readyState,
            url: streamUrl,
            details:
              "Check if the server is running and agent service is available",
          });
          updateStatus("Connection error - Check server logs");
          resetButtons();
        };
      }

      function stopStreaming() {
        if (eventSource) {
          eventSource.close();
          eventSource = null;
        }
        updateStatus("Stream stopped");
        resetButtons();
      }

      function resetButtons() {
        generateBtn.disabled = false;
        stopBtn.disabled = true;
      }

      document
        .getElementById("postForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const formData = new FormData(e.target);
          const requestData = {
            user_id: formData.get("userId"),
            platform: formData.get("platform"),
            include_company_data: formData.has("includeCompanyData"),
          };

          if (formData.get("customPrompt")) {
            requestData.custom_prompt = formData.get("customPrompt");
          }

          if (formData.get("companyUrl")) {
            requestData.company_url = formData.get("companyUrl");
          }

          startStreaming(requestData);
        });

      document
        .getElementById("stopBtn")
        .addEventListener("click", stopStreaming);

      // Cleanup on page unload
      window.addEventListener("beforeunload", function () {
        if (eventSource) {
          eventSource.close();
        }
      });
    </script>
  </body>
</html>
